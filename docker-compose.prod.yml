version: "3.8"

services:

  db:
    image: postgres:16

    container_name: odoo19-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - odoo_network

  odoo:

    image: satheeshkumaresh/odoo19:latest

    container_name: odoo19

    restart: unless-stopped

    depends_on:
      - db

    ports:
      - "8069:8069"

    environment:
      HOST: db
      USER: odoo
      PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - odoo_data:/var/lib/odoo

    networks:
      - odoo_network

volumes:

  postgres_data:

  odoo_data:

networks:

  odoo_network:
